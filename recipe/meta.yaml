{% set name = "python-jenkins" %}
{% set version = "1.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 8f4761c391ac11e8c1f23f771010920c10440497705ab7175d52358f5a12dc98

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
    - pbr 6.1.1
  run:
    - python
    - pbr >=0.8.2
    - multi_key_dict
    - requests

# Tests skipped: AttributeError: 'JenkinsWhoamiTest' object has no attribute 'j'.
# This module in stestr>=2.0.0,!=3.0.0, but it is not available in main channel.
test:
  imports:
    - jenkins
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://git.openstack.org/cgit/openstack/python-jenkins
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: Python Jenkins is a python wrapper for the Jenkins REST API
  description: |
    Python Jenkins is a python wrapper for the Jenkins REST API which aims to provide a more conventionally pythonic way of controlling a Jenkins server.
    It provides a higher-level API containing a number of convenience functions.
  dev_url: https://opendev.org/jjb/python-jenkins
  doc_url: https://opendev.org/jjb/python-jenkins/src/branch/master/README.rst

extra:
  recipe-maintainers:
    - nicoddemus
  skip-lints:
    - host_section_needs_exact_pinnings
    - python_build_tool_in_run
